<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Index Mark Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <div class="brand">
            <h1>Index Mark Calculator</h1>
            <p>Welcome back</p>
        </div>

        <div class="card">
            <h2 class="card-title">Student Login</h2>
            <form id="loginForm">
                <label for="username">Username</label>
                <input type="text" id="username" required>

                <label for="password">Password</label>
                <input type="password" id="password" required>

                <div id="errorMsg" class="error-msg"></div>

                <button type="submit" class="btn btn-primary">Login</button>
                <div class="btn-row">
                    <a class="btn btn-secondary" href="register.html">Create Account</a>
                    <a class="btn btn-ghost" href="index.html">Home</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.classList.remove("show");

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.message || "Login failed.";
                    errorMsg.classList.add("show");
                    return;
                }

                setStudentId(data.studentId);

                if (data.stream && data.indexMark !== null) {
                    window.location.href = "result.html";
                } else if (data.stream) {
                    window.location.href = `enter-marks.html?stream=${encodeURIComponent(data.stream)}`;
                } else {
                    window.location.href = "select-stream.html";
                }
            } catch (err) {
                errorMsg.textContent = "Could not reach the server. Is the backend running?";
                errorMsg.classList.add("show");
            }
        });
    </script>
</body>

</html>
